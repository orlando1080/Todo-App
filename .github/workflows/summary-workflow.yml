name: Generate Summary

on:
  push:
    branches:
      - main

jobs:
  generate-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Generate summary
        run: |
          curl -X POST https://api.github.com/models/generate-summary \
            -H 'Authorization: token ${{ secrets.GITHUB_TOKEN }}' \
            -H 'Accept: application/vnd.github.v3+json' -d '{ "content": "$(cat README.md)" }' \ 
            -o summary.txt

      - name: Upload summary
        uses: actions/upload-artifact@v2
        with:
          name: summary
          path: summary.txt
