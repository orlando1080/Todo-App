<div class="todo-container">
  <h2>My Tasks</h2>
  <ul>
    @for (item of todos(); track item.id) {
      <li [class.completed]="!item.isCompleted">
        {{ item.title }}
      </li>
    } @empty {
      <p>No tasks yet! Add one above.</p>
    }
  </ul>
</div>

<div class="add-task">
  <input
    [(ngModel)]="newTodoTitle"
    (keyup.enter)="add()"
    placeholder="What needs to be done?"
  />
  <button (click)="add()">Add Task</button>
</div>

<hr />

<ul>
  @for (item of todos(); track item.id) {
    <li>
      <span>{{ item.title }}</span>
      <button (click)="_todoService.delete(item.id)">Delete</button>
    </li>
  } @empty {
    <p>No tasks found. Get to work!</p>
  }
</ul>
