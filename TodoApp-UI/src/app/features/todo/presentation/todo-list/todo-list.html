<div class="todo-container">
  <h2>My Tasks</h2>
  @if (todos().length === 0) {
    <p>No tasks yet! Add one below.</p>
  }
</div>

<div class="add-task">
  <input
    [(ngModel)]="newTodoTitle"
    (keyup.enter)="add()"
    placeholder="What needs to be done?"
  />
  <button (click)="add()">Add Task</button>
</div>

<hr />

<ul>
  @for (item of todos(); track item.id) {
    <li [class.completed]="item.isCompleted">
      <span>{{ item.title }}</span>
      <button (click)="delete(item.id)">Delete</button>
      <button (click)="toggleIsComplete(item.id)">Toggle</button>
    </li>
  } @empty {
    <p>No tasks found. Get to work!</p>
  }
</ul>
